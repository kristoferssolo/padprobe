name: Publish gamepad-widget
on:
  push:
    tags:
      - "gamepad-widget-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version number in the format 1.2.3
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: publish-gamepad-widget-${{ github.ref }}
  cancel-in-progress: false
env:
  CARGO_TERM_COLOR: always
jobs:
  metadata:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve and validate release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              version="$INPUT_VERSION"
          else
              version="${REF_NAME#gamepad-widget-v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Version must be a valid SemVer value without a leading v"
              exit 1
          fi

          manifest_version="$(
              cargo metadata --no-deps --format-version 1 |
                  jq -r '.packages[] | select(.name == "gamepad-widget") | .version'
          )"
          if [[ "$manifest_version" != "$version" ]]; then
              echo "::error::gamepad-widget is version $manifest_version, not $version"
              exit 1
          fi

          {
              echo "tag=gamepad-widget-v$version"
              echo "version=$version"
          } >>"$GITHUB_OUTPUT"
  publish:
    name: Publish gamepad-widget to crates.io
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
        run: cargo publish --locked --package gamepad-widget
