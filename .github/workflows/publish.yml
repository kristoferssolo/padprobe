name: Publish
on:
  push:
    tags:
      - "gamepad-widget-v*"
      - "padprobe-v*"
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        options:
          - gamepad-widget
          - padprobe
      version:
        description: Version number in the format 1.2.3
        required: true
        type: string
permissions:
  contents: read
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false
env:
  CARGO_TERM_COLOR: always
jobs:
  metadata:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.release.outputs.package }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve and validate release metadata
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              package="$INPUT_PACKAGE"
              version="$INPUT_VERSION"
          elif [[ "$REF_NAME" == gamepad-widget-v* ]]; then
              package="gamepad-widget"
              version="${REF_NAME#gamepad-widget-v}"
          elif [[ "$REF_NAME" == padprobe-v* ]]; then
              package="padprobe"
              version="${REF_NAME#padprobe-v}"
          else
              echo "::error::Unsupported release ref: $REF_NAME"
              exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Version must be a valid SemVer value without a leading v"
              exit 1
          fi

          manifest_version="$(
              cargo metadata --no-deps --format-version 1 |
                  jq --arg package "$package" -r \
                      '.packages[] | select(.name == $package) | .version'
          )"
          if [[ "$manifest_version" != "$version" ]]; then
              echo "::error::$package is version $manifest_version, not $version"
              exit 1
          fi

          {
              echo "package=$package"
              echo "tag=$package-v$version"
              echo "version=$version"
          } >>"$GITHUB_OUTPUT"
  publish:
    name: Publish ${{ needs.metadata.outputs.package }} to crates.io
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
          PACKAGE: ${{ needs.metadata.outputs.package }}
        run: cargo publish --locked --package "$PACKAGE"
  build-binaries:
    name: Build Padprobe (${{ matrix.target }})
    if: needs.metadata.outputs.package == 'padprobe'
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install --yes libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --locked --release --bin padprobe
      - name: Package binary
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail

          archive="padprobe-$VERSION-$TARGET"
          mkdir -p "dist/$archive"
          install -m 0755 target/release/padprobe "dist/$archive/padprobe"
          cp LICENSE-APACHE LICENSE-MIT README.md "dist/$archive/"
          tar -C dist -czf "dist/$archive.tar.gz" "$archive"
          (
              cd dist
              sha256sum "$archive.tar.gz" >"$archive.tar.gz.sha256"
          )
      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: padprobe-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
  release:
    name: Create ${{ needs.metadata.outputs.package }} GitHub release
    if: >-
      always() && needs.metadata.result == 'success' && needs.publish.result == 'success' && (needs.build-binaries.result == 'success' || needs.build-binaries.result == 'skipped')
    needs:
      - metadata
      - publish
      - build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Padprobe binaries
        if: needs.metadata.outputs.package == 'padprobe'
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: padprobe-*
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_TAG_PUSH: ${{ github.event_name == 'push' }}
          PACKAGE: ${{ needs.metadata.outputs.package }}
          TAG: ${{ needs.metadata.outputs.tag }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail

          args=(
            "$TAG"
            --generate-notes
            --target "$GITHUB_SHA"
            --title "$PACKAGE v$VERSION"
          )
          if [[ "$IS_TAG_PUSH" == "true" ]]; then
            args+=(--verify-tag)
          fi
          if [[ "$PACKAGE" == "padprobe" ]]; then
            args+=(--latest)
            shopt -s nullglob
            assets=(dist/*.tar.gz dist/*.sha256)
            if (( ${#assets[@]} == 0 )); then
              echo "::error::No Padprobe release assets were downloaded"
              exit 1
            fi
            args+=("${assets[@]}")
          else
            args+=(--latest=false)
          fi

          gh release create "${args[@]}"
